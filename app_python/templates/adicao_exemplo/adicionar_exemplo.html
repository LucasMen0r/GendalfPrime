<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Exemplo - Gendalf</title>
</head>
<body>
    <h1>Adicionar ou Atualizar Exemplo</h1>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Objeto foco</label><br>
        <input type="text" name="foco" placeholder="Procedure, Tabela, Coluna..." required>
        <br><br>

        <label>Exemplo</label><br>
        <input type="text" name="texto" placeholder="Ex: ProvimentoJari" required>
        <br><br>

        <label>Classificação</label><br>
        <select name="is_bom" required>
            <option value="S">Bom exemplo</option>
            <option value="N">Mau exemplo</option>
        </select>
        <br><br>

        <label>Explicação técnica</label><br>
        <textarea name="explicacao" rows="5" required></textarea>
        <br><br>

        <button type="submit">Salvar exemplo</button>
    </form>
</body>
</html>
